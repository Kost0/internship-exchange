syntax = "proto3";

package profile;

option go_package = "github.com/Kost0/internship-exchange/proto/profile";

service ProfileService {
  rpc GetMyStudentProfile(GetMyStudentProfileRequest) returns (StudentProfileResponse);
  rpc GetStudentProfile(GetStudentProfileRequest) returns (StudentProfileResponse);
  rpc UpdateStudentProfile(UpdateStudentProfileRequest) returns (StudentProfileResponse);
  rpc UploadAvatar(UploadAvatarRequest) returns (UploadAvatarResponse);
  rpc UploadResume(UploadResumeRequest) returns (UploadResumeResponse);
  rpc GetResumeURL(GetResumeURLRequest) returns (GetResumeURLResponse);

  rpc AddEducation(AddEducationRequest) returns (EducationResponse);
  rpc UpdateEducation(UpdateEducationRequest) returns (EducationResponse);
  rpc DeleteEducation(DeleteEducationRequest) returns (DeleteResponse);

  rpc AddExperience(AddExperienceRequest) returns (ExperienceResponse);
  rpc UpdateExperience(UpdateExperienceRequest) returns (ExperienceResponse);
  rpc DeleteExperience(DeleteExperienceRequest) returns (DeleteResponse);

  rpc AddProject(AddProjectRequest) returns (ProjectResponse);
  rpc UpdateProject(UpdateProjectRequest) returns (ProjectResponse);
  rpc DeleteProject(DeleteProjectRequest) returns (DeleteResponse);

  rpc GetMyCompanyProfile(GetMyCompanyProfileRequest) returns (CompanyProfileResponse);
  rpc GetCompanyProfile(GetCompanyProfileRequest) returns (CompanyProfileResponse);
  rpc UpdateCompanyProfile(UpdateCompanyProfileRequest) returns (CompanyProfileResponse);
  rpc UploadLogo(UploadLogoRequest) returns (UploadLogoResponse);

  rpc AddSkill(AddSkillRequest) returns (SkillResponse);
  rpc DeleteSkill(DeleteSkillRequest) returns (DeleteResponse);

  rpc AddLanguage(AddLanguageRequest) returns (LanguageResponse);
  rpc DeleteLanguage(DeleteLanguageRequest) returns (DeleteResponse);
}

message StudentProfileResponse {
  string id           = 1;
  string user_id      = 2;
  string first_name   = 3;
  string last_name    = 4;
  string phone        = 5;
  string city         = 6;
  string bio          = 7;
  string avatar_url   = 8;
  string resume_url   = 9;
  string github_url   = 10;
  string linkedin_url = 11;
  string portfolio_url = 12;
  repeated EducationResponse educations   = 13;
  repeated ExperienceResponse experiences = 14;
  repeated ProjectResponse projects       = 15;
  repeated SkillResponse skills           = 16;
  repeated LanguageResponse languages     = 17;
}

message EducationResponse {
  string id             = 1;
  string student_id     = 2;
  string university     = 3;
  string faculty        = 4;
  string specialization = 5;
  string degree         = 6;
  int32  start_year     = 7;
  int32  end_year       = 8;
  double gpa            = 9;
  bool   is_current     = 10;
}

message ExperienceResponse {
  string id           = 1;
  string student_id   = 2;
  string company_name = 3;
  string position     = 4;
  string description  = 5;
  string start_date   = 6;
  string end_date     = 7;
  bool   is_current   = 8;
  string format       = 9;
}

message ProjectResponse {
  string id          = 1;
  string student_id  = 2;
  string title       = 3;
  string description = 4;
  string url         = 5;
  repeated string techs = 6;
  string start_date  = 7;
  string end_date    = 8;
}

message SkillResponse {
  string id         = 1;
  string student_id = 2;
  string skill      = 3;
  string level      = 4;
}

message LanguageResponse {
  string id         = 1;
  string student_id = 2;
  string language   = 3;
  string level      = 4;
}

message CompanyProfileResponse {
  string id               = 1;
  string user_id          = 2;
  string name             = 3;
  string tagline          = 4;
  string description      = 5;
  string industry         = 6;
  string size             = 7;
  int32  founded_year     = 8;
  string website          = 9;
  string contact_email    = 10;
  string city             = 11;
  string country          = 12;
  bool   is_remote_friendly = 13;
  string logo_url         = 14;
}

message GetMyStudentProfileRequest { string user_id = 1; }
message GetStudentProfileRequest   { string id = 1; }

message UpdateStudentProfileRequest {
  string user_id      = 1;
  string first_name   = 2;
  string last_name    = 3;
  string phone        = 4;
  string city         = 5;
  string bio          = 6;
  string github_url   = 7;
  string linkedin_url = 8;
  string portfolio_url = 9;
}

message UploadAvatarRequest  { string user_id = 1; bytes data = 2; string content_type = 3; }
message UploadAvatarResponse { string avatar_url = 1; }
message UploadResumeRequest  { string user_id = 1; bytes data = 2; }
message UploadResumeResponse { string resume_url = 1; }
message GetResumeURLRequest  { string student_id = 1; }
message GetResumeURLResponse { string url = 1; }

message AddEducationRequest {
  string user_id        = 1;
  string university     = 2;
  string faculty        = 3;
  string specialization = 4;
  string degree         = 5;
  int32  start_year     = 6;
  int32  end_year       = 7;
  double gpa            = 8;
  bool   is_current     = 9;
}
message UpdateEducationRequest {
  string id             = 1;
  string user_id        = 2;
  string university     = 3;
  string faculty        = 4;
  string specialization = 5;
  string degree         = 6;
  int32  start_year     = 7;
  int32  end_year       = 8;
  double gpa            = 9;
  bool   is_current     = 10;
}
message DeleteEducationRequest { string id = 1; string user_id = 2; }

message AddExperienceRequest {
  string user_id      = 1;
  string company_name = 2;
  string position     = 3;
  string description  = 4;
  string start_date   = 5;
  string end_date     = 6;
  bool   is_current   = 7;
  string format       = 8;
}
message UpdateExperienceRequest {
  string id           = 1;
  string user_id      = 2;
  string company_name = 3;
  string position     = 4;
  string description  = 5;
  string start_date   = 6;
  string end_date     = 7;
  bool   is_current   = 8;
  string format       = 9;
}
message DeleteExperienceRequest { string id = 1; string user_id = 2; }

message AddProjectRequest {
  string user_id     = 1;
  string title       = 2;
  string description = 3;
  string url         = 4;
  repeated string techs = 5;
  string start_date  = 6;
  string end_date    = 7;
}
message UpdateProjectRequest {
  string id          = 1;
  string user_id     = 2;
  string title       = 3;
  string description = 4;
  string url         = 5;
  repeated string techs = 6;
  string start_date  = 7;
  string end_date    = 8;
}
message DeleteProjectRequest { string id = 1; string user_id = 2; }

message DeleteResponse { bool success = 1; }

message GetMyCompanyProfileRequest  { string user_id = 1; }
message GetCompanyProfileRequest    { string id = 1; }
message UpdateCompanyProfileRequest {
  string user_id           = 1;
  string name              = 2;
  string tagline           = 3;
  string description       = 4;
  string industry          = 5;
  string size              = 6;
  int32  founded_year      = 7;
  string website           = 8;
  string contact_email     = 9;
  string city              = 10;
  string country           = 11;
  bool   is_remote_friendly = 12;
}
message UploadLogoRequest  { string user_id = 1; bytes data = 2; string content_type = 3; }
message UploadLogoResponse { string logo_url = 1; }

message AddSkillRequest {
  string user_id = 1;
  string skill   = 2;
  string level   = 3;
}
message DeleteSkillRequest { string id = 1; string user_id = 2; }

message AddLanguageRequest {
  string user_id  = 1;
  string language = 2;
  string level    = 3;
}
message DeleteLanguageRequest { string id = 1; string user_id = 2; }